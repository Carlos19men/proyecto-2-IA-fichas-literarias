version: '3.8'

services:
  neo4j:
    image: neo4j:5.15
    container_name: neo4j_literario
    ports:
      - "7474:7474" 
      - "7687:7687" 
    environment:
      # Docker leerá el usuario y contraseña directamente de tu archivo .env
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    volumes:
      - ./data/neo4j_data:/data